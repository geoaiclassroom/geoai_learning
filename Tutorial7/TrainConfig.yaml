seed_everything: 42 # true

trainer:
  accelerator: "gpu"
  devices: -1
  strategy: auto # ddp
  precision: 32 # "16-mixed"
  sync_batchnorm: true
  logger:
    class_path: lightning.pytorch.loggers.mlflow.MLFlowLogger
    init_args:
      save_dir: ./logs/mlrun
      log_model: all
      experiment_name: "unet_segmentation"
      run_name: "waterloo_subset"
  callbacks:
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        mode: "min"
        verbose: False
        patience: 20
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        mode: "min"
        save_top_k: 1
        filename: "model-{epoch:02d}-{val_loss:.3f}"
    - class_path: geo_deep_learning.tools.callbacks.segmentation_visualization.VisualizationCallback
      init_args:
        max_samples: 4
  max_epochs: 10

model:
  class_path: geo_deep_learning.tasks_with_models.segmentation_unetplus.SegmentationUnetPlus
  init_args:
    encoder: "resnet34"
    image_size: [512, 512]
    weights: null # imagenet
    in_channels: 3
    max_samples: 4
    num_classes: 2
    loss:
      class_path: segmentation_models_pytorch.losses.SoftCrossEntropyLoss
      init_args:
        smooth_factor: 0.1
    optimizer:
      class_path: torch.optim.Adam
      init_args:
        lr: 1e-4
    scheduler:
      class_path: torch.optim.lr_scheduler.ReduceLROnPlateau
      init_args:
        mode: "min"
        factor: 0.1
        patience: 10
        cooldown: 1
        min_lr: 1e-8
    scheduler_config:
      interval: "epoch"
      frequency: 1
      monitor: "val_loss"
    class_labels: ["background", "buildings"]
    class_colors: ["#000000", "#FF0000"]
    weights_from_checkpoint_path: null


data:
  class_path: geo_deep_learning.datamodules.csv_datamodule.CSVDataModule
  init_args:
    batch_size: 4
    num_workers: 1
    patch_size:
    - 512
    - 512
    mean:
    - 0.5
    - 0.5
    - 0.5
    std:
    - 0.2
    - 0.2
    - 0.2
    csv_root_folder: ./Data/waterloo_subset_512
    patches_root_folder: ./Data/waterloo_subset_512
    single_label: True
    convert_255_to_1_mask: True

ckpt_path: null
